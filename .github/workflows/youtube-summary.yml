name: YouTube Video Summarizer

on:
  schedule:
    - cron: '0 */4 * * *'  # 每 4 小时检查一次新视频
  workflow_dispatch:        # 支持手动触发

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 需要提交 seen_videos.json

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install \
            youtube-transcript-api \
            feedparser \
            openai \
            requests \
            pdfplumber
          # 始终安装最新版 yt-dlp，避免 YouTube 反爬导致下载失败
          pip install -U yt-dlp

      - name: Write YouTube cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            echo "$YOUTUBE_COOKIES" > /tmp/youtube_cookies.txt
            echo "✅ YouTube cookies 已写入"
          else
            echo "⚠️  未配置 YOUTUBE_COOKIES，跳过"
          fi

      - name: Run summarizer
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
        run: python scripts/youtube_summarizer.py

      - name: Commit seen videos
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/seen_videos.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📺 Update seen videos"
            git pull --rebase origin main
            git push
          fi
