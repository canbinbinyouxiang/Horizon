name: YouTube Video Summarizer

on:
  schedule:
    - cron: '0 0,4,10,14 * * *'  # 每天8/12/18/22点整执行检查视频
  workflow_dispatch:        # 支持手动触发
jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 需要提交 seen_videos.json

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install \
            youtube-transcript-api \
            feedparser \
            openai \
            requests \
            pdfplumber \
            yt-dlp

      - name: Run summarizer
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          HORIZON_WEBHOOK_URL: ${{ secrets.HORIZON_WEBHOOK_URL }}
          # 可选：手动填入 channel_id 跳过自动获取（更稳定）
          YOUTUBE_CHANNEL_ID: "UC8gZZWIWmBuCb_gzC8DUrvw"
        run: python scripts/youtube_summarizer.py

      - name: Commit seen videos
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/seen_videos.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📺 Update seen videos"
            git pull --rebase origin main
            git push
          fi
