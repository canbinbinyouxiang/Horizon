name: Stock Daily Analysis

on:
  schedule:
    - cron: '0 16 * * *'  # 北京时间每天 00:00
  workflow_dispatch:        # 支持手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai requests beautifulsoup4 duckduckgo-search lxml

      - name: Run stock analyst
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          STOCK_WEBHOOK_URL: ${{ secrets.STOCK_WEBHOOK_URL }}
          SERPER_API_KEY:   ${{ secrets.SERPER_API_KEY }}   # 可选，不配置则用 DuckDuckGo
        run: python scripts/stock_analyst.py
